<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ESS Sample Exam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- SurveyJS CDN -->
  <link rel="stylesheet" href="https://unpkg.com/survey-core/defaultV2.min.css" />
  <script src="https://unpkg.com/survey-core/survey.core.min.js"></script>
  <script src="https://unpkg.com/survey-js-ui/survey-js-ui.min.js"></script>

  <style>
    body { font-family: system-ui; background: #f5f5f7; margin: 0; }
    header { background: #111827; color: #fff; padding: 1rem 1.5rem; }
    main { max-width: 800px; margin: 2rem auto; padding: 1.5rem; background: #fff;
           border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    #results { margin-top: 2rem; padding: 1rem; background: #f3f4f6; border-radius: 8px; }
  </style>
</head>

<body>
<header><h1>Sample Exam</h1></header>

<main>
  <p>Answer the questions below. Your progress is saved automatically.</p>
  <div id="surveyContainer"></div>
  <div id="results" style="display:none;"></div>
</main>

<script>
  /* ---------------------------
     EXAM JSON (can be external)
     --------------------------- */
  const examJson = {
    title: "Web Basics Exam",
    showProgressBar: "top",
    pages: [
      {
        elements: [
          {
            type: "radiogroup",
            name: "q1_protocol",
            title: "Which protocol does HTTPS use for encryption?",
            isRequired: true,
            choices: ["FTP", "SSH", "TLS", "SMTP"],
            correctAnswer: "TLS"
          },
          {
            type: "comment",
            name: "q2_explain",
            title: "Explain the difference between HTTP and HTTPS.",
            isRequired: true,
            rows: 5
          }
        ]
      }
    ]
  };

  /* ---------------------------
     LOCAL STORAGE PERSISTENCE
     --------------------------- */
  const STORAGE_KEY = "my_exam_answers";

  function saveProgress(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadProgress() {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : null;
  }

  /* ---------------------------
     CREATE SURVEY MODEL
     --------------------------- */
  const survey = new Survey.Model(examJson);

  // Load saved answers
  const savedData = loadProgress();
  if (savedData) survey.data = savedData;

  // Save on every change
  survey.onValueChanged.add((sender) => {
    saveProgress(sender.data);
  });

  /* ---------------------------
     SCORING FOR MULTIPLE CHOICE
     --------------------------- */
  function calculateScore(model) {
    let score = 0;
    model.getAllQuestions().forEach(q => {
      if (q.correctAnswer !== undefined) {
        if (model.data[q.name] === q.correctAnswer) score++;
      }
    });
    return score;
  }

  /* ---------------------------
     ON COMPLETE
     --------------------------- */
  survey.onComplete.add((sender) => {
    const data = sender.data;
    const score = calculateScore(sender);

    // Clear saved progress
    localStorage.removeItem(STORAGE_KEY);

    const resultsDiv = document.getElementById("results");
    resultsDiv.style.display = "block";
    resultsDiv.textContent =
      "Your answers:\n\n" +
      JSON.stringify(data, null, 2) +
      "\n\nScore: " + score;
  });

  /* ---------------------------
     RENDER SURVEY
     --------------------------- */
  document.addEventListener("DOMContentLoaded", () => {
    SurveyJSUI.Survey.render("surveyContainer", { model: survey });
  });
</script>

</body>
</html>
