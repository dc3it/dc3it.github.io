<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAI AskBot🤖</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --panel: #1a1a1a;
      --user: #3a3f7a;
      --assistant: #2a2a2a;
      --text: #e6e6e6;
      --accent: #8ab4f8;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 1rem;
      background: var(--panel);
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    footer {
      padding: 1rem;
      background: var(--panel);
      border-top: 1px solid #333;
      display: flex;
      gap: 0.5rem;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: #111;
      color: var(--text);
    }

    button {
      padding: 0 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    hr {
      padding: .5em;
    }

    .questionFormat {
      color: #4CAF50;
      font-weight: 600;
      border-radius: 12px;
      padding: 7px 7px;
      text-shadow: 0 0 3px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.1);
      /* margin-bottom: 5px; */
    }

    dialog#toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      margin: 0;
      /* Override default centering */
      border: none;
      background: #333;
      color: white;
      padding: 1rem;
      border-radius: 8px;
    }

    /* Flexible Google-style progress indicator https://lea.verou.me/blog/2013/11/flexible-google-style-loader-with-css/
        another option https://lea.verou.me/blog/2013/11/cleanest-css-spinner-ever/ 
    */
    @keyframes progress {
      50% {
        border-width: .5em 0;
      }

      to {
        border-width: .5em 0 0 0;
      }
    }

    @keyframes rotate {
      to {
        transform: rotate(-270deg);
      }
    }

    .progress {
      display: inline-block;
      font-size: 50px;
      /* Size of the progress indicator */
      width: 1em;
      height: 1em;
      border: solid white;
      border-top-color: #ddd;
      border-width: 0 0 .5em 0;
      border-radius: 50%;
      box-sizing: border-box;
      margin: .1em .2em;
      background: linear-gradient(white 50%, #ddd 50%);
      background-origin: border-box;
      transform: rotate(90deg);
      animation: rotate 1s steps(4) infinite,
        progress .25s linear infinite alternate;
      text-indent: 99em;
      overflow: hidden;
    }

    .progress.small {
      font-size: 16px
    }
    /* end progress indicator */

    /* output wrapper */
    .wrapper {
      overflow: auto;
      max-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* The switch - the box around the slider */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    /* Hide default HTML checkbox */
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* The slider */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      -webkit-transition: .4s;
      transition: .4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      -webkit-transition: .4s;
      transition: .4s;
    }

    input:checked+.slider {
      background-color: #2196F3;
    }

    input:focus+.slider {
      box-shadow: 0 0 1px #2196F3;
    }

    input:checked+.slider:before {
      -webkit-transform: translateX(26px);
      -ms-transform: translateX(26px);
      transform: translateX(26px);
    }

    /* Rounded sliders */
    .slider.round {
      border-radius: 24px;
    }

    .slider.round:before {
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <dialog id="toast" role="status">
  </dialog>

  <div id="app">
    <header>
      <h1>AI Chat</h1>
      <label for="useAI">Enable WebAI?&nbsp;</label>
      <label class="switch">
        <input type="checkbox" id="useAI" />
        <span class="slider round"></span>
      </label>
      <span id="model-status"></span>
      <span id="model-status"></span>
    </header>

    <main id="messages">
      <div id="output" class="wrapper"></div>
    </main>

    <footer>
      <textarea id="input" placeholder="Type a message…"></textarea>
      <button type="button" id="send">Send</button><button type="button" id="stop">Stop</button>
    </footer>
  </div>

  <script type="module">
    // #region *** globals ***
    // Description: 
    // Created on: 2026.03.31
    // Modified on: 2026.04.21
    // ***
    let aiAvailability;
    let aiSession;
    let modelStatusEl = document.querySelector("#model-status");
    const messagesEl = document.getElementById("messages");
    const inputPrompt = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const toast = document.getElementById('toast');
    const controller = new AbortController();
    document.querySelector("#stop").onclick = () => controller.abort();
    //import { marked } from "https://cdn.jsdelivr.net/npm/marked@13.0.3/lib/marked.esm.js"; //uncomment to use output option 2
    import DOMPurify from "https://cdn.jsdelivr.net/npm/dompurify@3.4.1/dist/purify.es.mjs";
    import * as smd from "https://cdn.jsdelivr.net/npm/streaming-markdown/smd.min.js";
    // #endregion

    // #region *** toast message ***
    // Description: handles formatting toast message with html dialog
    // Created on: 2026.04.20
    // Modified on:
    // ***
    const toastMsg = (msg) => {
      toast.innerHTML = msg;
      toast.show(); // Non-modal display
      setTimeout(() => {
        toast.close();
      }, 3000); // Closes after 3 seconds
    };
    // #endregion

    // #region *** ai event listeners ***
    // Description: handles dropdown selection
    // Created on: 2026.01.21
    // Modified on:
    // ***
    //ai
    document.querySelector("#useAI").addEventListener("click", () => {
      localStorage.setItem("useAI", document.querySelector("#useAI").value);
      if ((document.querySelector("#useAI").checked == true)) {
        //set up new session
        checkLocalAI();
      } else {
        //clean up on aisle ai
        if (aiSession) {
          aiSession.destroy();
        }
      }
    });
    // #endregion 

    // #region *** check in browser AI ***
    // Description: hendles determining if the browser and machine support AI APIs
    // Created on: 2025.09.15
    // Modified on: 
    // ***
    const checkLocalAI = async () => {
      if ("LanguageModel" in self) {
        if (!aiSession) {
          //set up AI
          try {
            aiAvailability = await LanguageModel.availability();
            if (aiAvailability == "downloadable" || aiAvailability == "available") {
              aiSession = await LanguageModel.create({
                expectedInputs: [{ type: "text", languages: ["en", "en"] }],
                expectedOutputs: [{ type: "text", languages: ["en"] }],
                initialPrompts: [
                  {
                    role: 'system',
                    content: 'You are a helpful local language model.'
                  }
                ],
                monitor(m) {
                  m.addEventListener('downloadprogress', (e) => {
                    console.log(`Checking local model readiness ${e.loaded * 100}%`);
                    if (e.loaded == 0) {
                      toast.innerHTML = `Checking local model readiness <div class="small progress">Loading…</div>`;
                    } else {
                      toast.innerHTML = `Checking local model readiness ${e.loaded * 100}% <div class="small progress">Loading…</div>`;
                    }
                    toast.show();
                  });
                },
              });
              //console.log(`Gemini Nano language model parameters: ${await LanguageModel.params()}`);              
              toastMsg("AI Session Created");
              toastMsg("Local AI Ready!");
              inputPrompt.focus();

            } else {
              toastMsg(`Error attempting to access Local AI.`, "toastError");
            }
          } catch (error) {
            toastMsg(`Error attempting to access Local AI. Please try again.`, "toastError");
          }
        } else {
          toastMsg("AI Session Already Created");
        }
      } else {
        toastMsg(`Local AI Not Available for this computer.`, "toastError");
      }
      modelStatusEl.innerHTML = `Context used: ${aiSession.contextUsage}/${aiSession.contextWindow}`;
    }
    // #endregion

    // #region *** Send message ***
    // Description: hendles processing the message
    // Created on: 2026.03.16
    // Modified on: 2026.04.21 added three variations for handling the output
    // ***
    const sendMessage = async () => {
      toastMsg(`Request received <div class="small progress">Processing…</div>`);
      const output = document.querySelector('#output');
      const renderer = smd.default_renderer(output);
      const parser = smd.parser(renderer);

      let promptText = inputPrompt.value.trim();

      if (!promptText) {
        return;
      }
      // reset
      inputPrompt.value = "";
      // setup Q & A
      const question = document.createElement("div");
      question.className = "questionFormat";
      question.textContent = `Question: ${promptText}`;
      output.append(question);
      const answer = document.createElement("div");
      output.append(answer);

      try {
        const result = await aiSession.promptStreaming(promptText, {
          signal: controller.signal
        });

        // #region *** approach 1 using the DOM ***
        // Description: following best practices https://developer.chrome.com/docs/ai/render-llm-responses
        // the huge weakness of this is zero semantic html output unless wanting to use a buffering approach to clean the output
        // or try to instruct the LLM via RAG / skills.md for the output
        // need to retain what the prior chunk was and test it that way can format it better
        // but still understand that you are not outputting semantic markup
        // need to conceive of a way to dynamically inject containers within the output to afford the scrollable history
        // or live with the innerHTML approach getting slower and slower - the other thought is 
        // off to the side of the UI/UX offering to save each one, but here again lackluster in terms of scroll
        // Created: 2026.04.21
        // ***
        //for await (const chunk of result) {
        //  console.log(chunk);
        //  // double chk if need to create w/in loop -short ans yes but verify - confirmed as of 2026.04.21
        //  let brElement1 = document.createElement("br");
        //  let brElement2 = document.createElement("br");
        //  if ((chunk == "  ") || (chunk == "   ") || (chunk == "\n")) {
        //    output.append(brElement1);
        //  } else if ((chunk == "\n\n\n\n") || (chunk == "\n\n")) {
        //    output.append(brElement1);
        //    output.append(brElement2);
        //  } else if (chunk == " **") {
        //    output.append("     -- ");
        //  } else {
        //    output.append(chunk.replaceAll('*', '').replaceAll('`', ''));
        //  }
        //}
        //let hrElement = document.createElement("hr");
        //output.append(hrElement);
        // #endregion

        // #region *** approach 2 using innerHTML and marked markdown streamer ***
        // Description: taken from https://chrome.dev/web-ai-demos/prompt-api-playground/script.js
        // which came from here https://chrome.dev/web-ai-demos/prompt-api-playground/
        // and when clicking on Prompt API playground here https://developer.chrome.com/docs/ai/prompt-api#performance_strategy
        // everything gets wiped after each run - you'd have to store in local storage and read back in, but even then
        // it could become daunting because the innerHTML performance would degrade - really only useful for one and dones
        // Created: 2026.04.21
        // ***       
        //let stream = "";
        //let previousChunk = "";
        //for await (const chunk of result) {
        //  console.log(chunk);
        //  const newChunk = chunk.startsWith(previousChunk)
        //    ? chunk.slice(previousChunk.length)
        //    : chunk;
        //  stream += newChunk;
        //  output.innerHTML = DOMPurify.sanitize(marked.parse(stream));
        //  //rawResponse.innerText = result;
        //  previousChunk = chunk;
        //}
        // #endregion

        // #region *** approach 3 using innerHTML and different markdown streamer ***
        // Description: taken from https://chrome.dev/web-ai-demos/ai-streaming-parser/script.js
        // which came from here https://chrome.dev/web-ai-demos/ai-streaming-parser/
        // and when clicking on AI Streaming Parser here https://developer.chrome.com/docs/ai/render-llm-responses
        // everything gets wiped after each run - you'd have to store in local storage and read back in, but even then
        // it could become daunting because the innerHTML performance would degrade - really only useful for one and dones
        // Created: 2026.04.21
        // ***
        const renderer = smd.default_renderer(answer);
        const parser = smd.parser(renderer);

        let chunks = '';
        for await (const chunk of result) {
          //console.log(chunk);
          chunks += chunk;
          // had to comment out DOMPurify because you have to whitelist any XML - 
          //best practice is to uncomment if you are not working with markup languages
          //DOMPurify.sanitize(chunks);
          //if (DOMPurify.removed.length) {
          //  // Immediately stop what you were doing.
          //  smd.parser_end(parser);
          //  const { from } = DOMPurify.removed[0];
          //  alert(
          //    'Insecure model output removed from <' +
          //    from.nodeName.toLowerCase() +
          //    '>.'
          //  );
          //  return;
          smd.parser_write(parser, chunk);
        }
        toastMsg(`Processing finished!`);
        smd.parser_end(parser);
        // #endregion

        modelStatusEl.innerHTML = `Context used: ${aiSession.contextUsage}/${aiSession.contextWindow}`;
      } catch (err) {
        smd.parser_end(parser);
        messagesEl.innerHTML = "Error calling browser AI.";
      }
    }
    // #endregion


    // #region *** send user messaage ***
    // Description: hendles user clicking send or enter key
    // Created on: 2026.03.16
    // Modified on: 
    // ***
    sendBtn.addEventListener("click", sendMessage);
    inputPrompt.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    // #endregion
  </script>
</body>

</html>
