<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --panel: #1a1a1a;
      --user: #3a3f7a;
      --assistant: #2a2a2a;
      --text: #e6e6e6;
      --accent: #8ab4f8;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 1rem;
      background: var(--panel);
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .message {
      max-width: 70%;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      border-radius: 12px;
      animation: fadeIn 0.2s ease-out;
    }

    .message.user {
      background: var(--user);
      margin-left: auto;
    }

    .message.assistant {
      background: var(--assistant);
      margin-right: auto;
    }

    footer {
      padding: 1rem;
      background: var(--panel);
      border-top: 1px solid #333;
      display: flex;
      gap: 0.5rem;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: #111;
      color: var(--text);
    }

    button {
      padding: 0 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .dvSection {
      display: block;
      padding: .25em;
    }

    .dvFollowSection {
      display: block;
      padding: 0px 0px .25em 0px;
    }

    dialog#toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      margin: 0;
      /* Override default centering */
      border: none;
      background: #333;
      color: white;
      padding: 1rem;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <dialog id="toast" role="status">
  </dialog>

  <div id="app">
    <header>
      <h1>AI Chat</h1>
      <label for="useAI">Use LocalAI?
        <input type="checkbox" id="useAI" /></label>
      <span id="model-status"></span>
    </header>

    <main id="messages">
      <div id="output" class="wrapper"></div>
    </main>

    <footer>
      <textarea id="input" placeholder="Type a message…"></textarea>
      <button type="button" id="send">Send</button><button type="button" id="stop">Stop</button>
    </footer>
  </div>

  <script>
    // #region *** globals ***
    // Description: 
    // Created on: 2026.03.31
    // Modified on: 
    // ***
    let aiAvailability;
    let aiSession;
    let modelStatusEl = document.querySelector("#model-status");
    const messagesEl = document.getElementById("messages");
    const inputPrompt = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const controller = new AbortController();
    document.querySelector("#stop").onclick = () => controller.abort();
    // #endregion

    // #region *** toast message ***
    // Description: handles formatting toast message with sweetalert
    // Created on: 2026.04.20
    // Modified on:
    // ***
    const toastMsg = (msg) => {
      const toast = document.getElementById('toast');
      toast.innerHTML = msg;
      toast.show(); // Non-modal display
      setTimeout(() => {
        toast.close();
      }, 3000); // Closes after 3 seconds
    };
    // #endregion

    // #region ai event listeners ***
    // Description: handles dropdown selection
    // Created on: 2026.01.21
    // Modified on:
    // ***
    //ai
    document.querySelector("#useAI").addEventListener("click", () => {
      localStorage.setItem("useAI", document.querySelector("#useAI").value);
      if ((document.querySelector("#useAI").checked == true)) {
        //set up new session
        checkLocalAI();
      } else {
        //clean up on aisle ai
        if (aiSession) {
          aiSession.destroy();
        }
      }
    });
    // #endregion 

    // #region *** check in browser AI ***
    // Description: hendles determining if the browser and machine support AI APIs
    // Created on: 2025.09.15
    // Modified on: 
    // ***
    const checkLocalAI = async () => {
      if ("LanguageModel" in self) {
        if (!aiSession) {
          //set up AI
          try {
            aiAvailability = await LanguageModel.availability();
            if (aiAvailability == "downloadable" || aiAvailability == "available") {
              aiSession = await LanguageModel.create({
                expectedInputs: [{ type: "text", languages: ["en", "en"] }],
                expectedOutputs: [{ type: "text", languages: ["en"] }],
                initialPrompts: [
                  {
                    role: 'system',
                    content: 'You are a helpful local language model.'
                  }
                ],
                monitor(m) {
                  m.addEventListener('downloadprogress', (e) => {
                    console.log(`Local model ready for use ${e.loaded * 100}%`);
                    toastMsg(`Local model initialization in progress. Please wait .... `)
                  });
                },
              });
              //console.log(`Gemini Nano language model parameters: ${await LanguageModel.params()}`);              
              toastMsg("AI Session Created");
              toastMsg("Local AI Ready!");
              inputPrompt.focus();

            } else {
              toastMsg(`Error attempting to access Local AI.`, "toastError");
            }
          } catch (error) {
            toastMsg(`Error attempting to access Local AI. Please try again.`, "toastError");
          }
        } else {
          toastMsg("AI Session Already Created");
        }
      } else {
        toastMsg(`Local AI Not Available for this computer.`, "toastError");
      }
      modelStatusEl.innerHTML = `Context used: ${aiSession.contextUsage}/${aiSession.contextWindow}`;
    }
    // #endregion


    // #region *** Send message ***
    // Description: hendles processing the message
    // Created on: 2026.03.16
    // Modified on: 2026.04.20
    // ***
    const sendMessage = async () => {
      const output = document.querySelector('#output');
      let promptText = inputPrompt.value.trim();

      if (!promptText) {
        return;
      }

      inputPrompt.value = "";
      try {
        const result = await aiSession.promptStreaming(promptText, {
          signal: controller.signal
        });
        let divElement = document.createElement("div");
        divElement.className = "dvSection";
        output.append(divElement);
        for await (const chunk of result) {
          console.log(chunk);
          let divElement = document.createElement("div");
          divElement.className = "dvSection";
          let divFollowElement = document.createElement("div");
          divFollowElement.className = "dvFollowSection";

          if ((chunk == "   ") || (chunk == "**")) {
            output.append(divElement);
          } else if (chunk == ":**") {
            output.append(divFollowElement);
          } else {
            output.append(chunk.replaceAll("*", ""));
          }
        }
        modelStatusEl.innerHTML = `Context used: ${aiSession.contextUsage}/${aiSession.contextWindow}`;
      } catch (err) {
        messagesEl.innerHTML = "Error calling browser AI.";
      }
    }

    // #region *** send user messaage ***
    // Description: hendles user clicking send or enter key
    // Created on: 2026.03.16
    // Modified on: 
    // ***
    sendBtn.addEventListener("click", sendMessage);
    inputPrompt.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    // #endregion
  </script>
</body>

</html>
